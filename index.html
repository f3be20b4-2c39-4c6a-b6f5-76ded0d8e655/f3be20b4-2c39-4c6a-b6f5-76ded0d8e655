<!DOCTYPE html>

<style>
    body{
        position: fixed;
        width:100%;
        height: 100%;

        overflow:hidden;
    }
    .OffLineMessage{
       margin-top:25vh;
    }
    .Retry{
        position:relative;
        width:90%;
        height:50px;
        border:none;
        background: forestgreen;
        color:white;
        border-radius: 10px;
        margin-top:5%;
    }
</style>
<body></body>
<script type="module">
    const ROUTECSS=(CODE)=>{const link = document.createElement('link');link.rel = 'stylesheet';link.href = CODE;document.head.appendChild(link);};
    const ROUTEJS=(CODE)=>{const script = document.createElement('script');script.src = CODE;script.async = true;document.head.appendChild(script);}
    if (localStorage.getItem("Packaged")) {
        ROUTEJS(localStorage.getItem("ERANDIXCONFIG"));ERANDES(); 
    } else {
        if (navigator.onLine) {
            import("./index.js").then((module) => {
                if (module.default) {
                    module.default();
                } else if (module.CONNECTION) {
                    module.CONNECTION();
                };
            });
        } else {           
            const BODY=document.querySelector("body");
            BODY.innerHTML=`
                <h1 class="OffLineMessage" >OFFLINE</h1>
                <p>Your offLine Please Check Your Internet Connection.</p>
                <button class="Retry">Retry</button>           
            `;
            const Retry=document.querySelector(".Retry");
            Retry.addEventListener("click",()=>{
                location.reload();
            });
        };
    };
</script>
</html>
