<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>const ROUTECSS = (CODE) => {if (CODE.trim().startsWith("http") || CODE.endsWith(".css")) {const link = document.createElement('link');link.rel = 'stylesheet';link.href = CODE;document.head.appendChild(link);} else {const style = document.createElement('style');style.textContent = CODE;document.head.appendChild(style);}};const ROUTEJS = (CODE) => {if (CODE.trim().startsWith("http") || CODE.endsWith(".js")) {const script = document.createElement('script');script.src = CODE;script.async = true;document.head.appendChild(script);} else {const script = document.createElement('script');script.textContent = CODE;document.head.appendChild(script);}};</script>
    <script>localStorage.setItem("Env","Dev");localStorage.setItem("Config","Erandix01");localStorage.setItem("Name","Erand");</script>
    <script type="module">if(localStorage.getItem("Packaged")){ROUTEJS(localStorage.getItem("ERANDIXCONFIG"));}</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erandix</title>
</head>
<style>
    body{
        position: fixed;
        width:100%;
        height: 100%;
        text-align: center;
        overflow:hidden;
    }
    .OffLineMessage{
       margin-top:25vh;
    }
    .Retry{
        position:relative;
        width:90%;
        height:50px;
        border:none;
        background: forestgreen;
        color:white;
        border-radius: 10px;
        margin-top:5%;
    }
</style>
<body></body>
<script defer type="module">
    if (localStorage.getItem("Packaged")) {
        ERANDES(); 
    } else {
        if (localStorage.getItem("Env") === "Dev") {
            import("./index.js").then((module) => {
                if (module.default) {
                    module.default();
                } else if (module.CONNECTION) {
                    module.CONNECTION();
                };
            }); 
        } else {   
            if (navigator.onLine) {
                import("https://jherujjirokk4uojrfipoh.github.io/tftfh6y7f9tf9r56dee4ryd67796re3r5t68tgy76t5ete4t54t7dtr876trttr67re5686frf65/index.js").then((module) => {
                    if (module.default) {
                        module.default();
                    } else if (module.CONNECTIONS) {
                        module.CONNECTION();
                    };
                });
            } else {
                const BODY=document.querySelector("body");
                BODY.innerHTML=`
                    <h1 class="OffLineMessage" >OFFLINE</h1>
                    <p>Your offLine Please Check Your Internet Connection.</p>
                    <button class="Retry">Retry</button>           
                `;
                const Retry=document.querySelector(".Retry");
                Retry.addEventListener("click",()=>{
                    location.reload();
                });
            };   
        };
    };
</script>
</html>
